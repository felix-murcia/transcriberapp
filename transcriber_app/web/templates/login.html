<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Login - TranscriberApp</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    
    <style>
        :root {
            --color-primary: #0078d4;
            --color-primary-dark: #005a9e;
            --color-danger: #a4262c;
            --color-gray-50: #f3f2f1;
            --color-gray-200: #e1dfdd;
            --color-gray-600: #605e5c;
            --color-gray-900: #201f1e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-box h2 {
            color: var(--color-gray-900);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .login-box h2 span {
            color: var(--color-primary);
        }
        
        .login-box .subtitle {
            color: var(--color-gray-600);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .oauth-btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--color-primary);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .oauth-btn:hover:not(:disabled) {
            background: var(--color-primary-dark);
        }
        
        .oauth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .error-msg {
            color: var(--color-danger);
            background: #fdecea;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .loading h2 {
            color: var(--color-gray-900);
            margin-bottom: 10px;
        }
        
        .loading p {
            color: var(--color-gray-600);
        }
    </style>
</head>

<body>
    <div class="login-box" id="login-container">
        <h2>Transcriber<span>App</span></h2>
        <p class="subtitle">Transcripción inteligente de audio</p>
        
        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}
        
        <!-- Botón de OAuth2 -->
        <button type="button" id="oauth-login-btn" class="oauth-btn">
            Iniciar sesión
        </button>
    </div>

    <script>
        // Configuración OAuth2
        const OAUTH2_CONFIG = {
            serverUrl: '{{ oauth2_url }}',
            clientId: '{{ client_id }}',
            clientSecret: '{{ client_secret }}',
            redirectUri: '{{ redirect_uri }}',
            scopes: 'openid profile read write'
        };
        
        // Generar code_verifier (43-128 caracteres)
        function generateCodeVerifier() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return btoa(String.fromCharCode.apply(null, array))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');
        }
        
        // Generar code_challenge desde code_verifier
        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');
        }
        
        // Iniciar flujo OAuth2
        async function startOAuth2Flow() {
            const btn = document.getElementById('oauth-login-btn');
            btn.disabled = true;
            btn.textContent = 'Redirigiendo...';
            
            try {
                // Generar code_verifier y code_challenge
                const codeVerifier = generateCodeVerifier();
                const codeChallenge = await generateCodeChallenge(codeVerifier);
                
                // Generar state aleatorio para CSRF
                const actualState = Math.random().toString(36).substring(2) + Date.now().toString(36);
                
                // Crear objeto con state y verifier
                const stateData = {
                    s: actualState,
                    v: codeVerifier
                };
                
                // Codificar en base64url
                const encodedState = btoa(JSON.stringify(stateData))
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_')
                    .replace(/=/g, '');
                
                // Guardar en sessionStorage
                sessionStorage.setItem('oauth_code_verifier', codeVerifier);
                sessionStorage.setItem('oauth_state', actualState);
                
                // Construir URL de autorización
                const authUrl = new URL(OAUTH2_CONFIG.serverUrl + '/oauth2/authorize');
                authUrl.searchParams.set('response_type', 'code');
                authUrl.searchParams.set('client_id', OAUTH2_CONFIG.clientId);
                authUrl.searchParams.set('redirect_uri', OAUTH2_CONFIG.redirectUri);
                authUrl.searchParams.set('scope', OAUTH2_CONFIG.scopes);
                authUrl.searchParams.set('code_challenge', codeChallenge);
                authUrl.searchParams.set('code_challenge_method', 'S256');
                authUrl.searchParams.set('state', encodedState);
                authUrl.searchParams.set('prompt', 'login');
                
                console.log('Redirecting to:', authUrl.toString());
                window.location.href = authUrl.toString();
                
            } catch (error) {
                console.error('Error:', error);
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
                showError('Error al iniciar OAuth2: ' + error.message);
            }
        }
        
        // Mostrar error
        function showError(message) {
            const container = document.getElementById('login-container');
            container.innerHTML = 
                '<h2>Transcriber<span>App</span></h2>' +
                '<p class="error-msg">' + message + '</p>' +
                '<button type="button" id="retry-btn" class="oauth-btn">Volver a intentar</button>';
            
            document.getElementById('retry-btn').addEventListener('click', () => {
                window.location.href = '/login';
            });
        }
        
        // Manejar callback - ejecutar cuando carga la página
        (function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const state = params.get('state');
            const errorDescription = params.get('error_description');
            
            if (error) {
                showError(error + (errorDescription ? ': ' + errorDescription : ''));
                return;
            }
            
            if (code) {
                // Extraer code_verifier del state codificado
                let codeVerifier = null;
                let originalState = null;
                
                if (state) {
                    try {
                        let paddedState = state.replace(/-/g, '+').replace(/_/g, '/');
                        const padding = 4 - paddedState.length % 4;
                        if (padding !== 4) {
                            paddedState += '='.repeat(padding);
                        }
                        
                        const stateData = JSON.parse(atob(paddedState));
                        originalState = stateData.s;
                        codeVerifier = stateData.v;
                    } catch (e) {
                        originalState = state;
                        codeVerifier = sessionStorage.getItem('oauth_code_verifier');
                    }
                }
                
                // Verificar state para prevenir CSRF
                const savedState = sessionStorage.getItem('oauth_state');
                if (originalState && savedState && originalState !== savedState) {
                    showError('State mismatch - posible ataque CSRF');
                    return;
                }
                
                if (!codeVerifier) {
                    codeVerifier = sessionStorage.getItem('oauth_code_verifier');
                }
                
                if (!codeVerifier) {
                    showError('Code verifier no encontrado. Intenta de nuevo.');
                    return;
                }
                
                // Mostrar estado de carga
                const container = document.getElementById('login-container');
                container.innerHTML = '<div class="loading"><h2>Completando autenticación...</h2><p>Por favor espera</p></div>';
                
                // Intercambiar código por token
                exchangeCodeForToken(code, codeVerifier)
                    .then(async (tokens) => {
                        console.log('Tokens received:', tokens);
                        
                        // Guardar tokens en localStorage
                        localStorage.setItem('access_token', tokens.access_token);
                        if (tokens.refresh_token) {
                            localStorage.setItem('refresh_token', tokens.refresh_token);
                        }
                        
                        // Obtener info del usuario
                        const userInfo = await getUserInfo(tokens.access_token);
                        console.log('User info:', userInfo);
                        
                        // Limpiar sessionStorage
                        sessionStorage.removeItem('oauth_code_verifier');
                        sessionStorage.removeItem('oauth_state');
                        
                        // Redirigir a página principal
                        window.location.href = '/';
                    })
                    .catch((err) => {
                        console.error('Error:', err);
                        showError('Error al completar autenticación: ' + err.message);
                    });
            }
        })();
        
        // Canjear código por token
        async function exchangeCodeForToken(code, codeVerifier) {
            const tokenResponse = await fetch(OAUTH2_CONFIG.serverUrl + '/oauth/token', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': 'Basic ' + btoa(OAUTH2_CONFIG.clientId + ':' + OAUTH2_CONFIG.clientSecret)
                },
                body: new URLSearchParams({
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: OAUTH2_CONFIG.redirectUri,
                    code_verifier: codeVerifier
                })
            });
            
            if (!tokenResponse.ok) {
                const errorText = await tokenResponse.text();
                throw new Error('Error canjeando código: ' + errorText);
            }
            
            return tokenResponse.json();
        }
        
        // Obtener información del usuario
        async function getUserInfo(accessToken) {
            const response = await fetch(OAUTH2_CONFIG.serverUrl + '/user/me', {
                headers: {
                    'Authorization': 'Bearer ' + accessToken
                }
            });
            
            if (response.ok) {
                return response.json();
            }
            return null;
        }
        
        // Event listener para el botón
        document.getElementById('oauth-login-btn').addEventListener('click', startOAuth2Flow);
    </script>
</body>
</html>
