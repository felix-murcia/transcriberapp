version: "3.9"

services:
  transcriberapp:
    container_name: transcriberapp
    build:
      context: .
      dockerfile: Dockerfile
    image: transcriberapp-container
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - cine-network

    ports:
      - "9000:9000"

    volumes:
      - ./transcriber_app:/app/transcriber_app
      - ${TRANSCRIBER_DATA}/audios:/app/audios
      - ${TRANSCRIBER_DATA}/transcripts:/app/transcripts
      - ${TRANSCRIBER_DATA}/outputs:/app/outputs
      - ${TRANSCRIBER_DATA}/outputs/metrics:/app/outputs/metrics

    environment:
      TZ: Europe/Madrid
      PYTHONUNBUFFERED: 1
      # API Keys
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # Workers
      UVICORN_WORKERS: 1
      # OAuth2
      OAUTH2_URL: http://oauth2-server:8080
      PUBLIC_OAUTH2_URL: http://localhost:8080
      PUBLIC_REDIRECT_URI: http://localhost:9000/oauth/callback
      OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID}
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET}
      # FFmpeg API externo
      FFMPEG_API_URL: ${FFMPEG_API_URL}
      # GROQ API
      GROQ_API_URL: ${GROQ_API_URL}
      GROQ_MODEL_TRANSCRIBER: ${GROQ_MODEL_TRANSCRIBER}
      # Chunk processing configuration
      CHUNKS_BASE_DIR: /app/audios/chunks
      MAX_CHUNK_SIZE_MB: 25
      CHUNK_PROCESSING_PARALLEL: false
      KEEP_CHUNKS_AFTER_PROCESSING: false

    depends_on:
      - ffmpeg-api

    command: >
      python -m src.main
      --host 0.0.0.0
      --port 9000
      --log-level debug
      --reload
      --proxy-headers
      --forwarded-allow-ips="*"

  ffmpeg-api:
    container_name: ffmpeg-api
    image: felixmurcia/ffmpeg-api:latest
    restart: unless-stopped
    command: ["python3", "/app/app.py"]
    networks:
      - cine-network


networks:
  cine-network:
    external: true
